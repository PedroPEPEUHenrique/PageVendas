<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Última Chance | Backend Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --CorFundo: #fafaf7;
  --CorCartao: #ffffff;
  --CorTexto: #1c1c1a;
  --CorTextoSuave: #6b6b65;
  --CorDestaque: #4a6b3a;
  --CorDestaqueFundo: #eef2ea;
  --CorBorda: #e8e6df;
  --CorSombraMedia: rgba(28, 28, 26, 0.08);

  --FonteDisplay: 'Instrument Serif', Georgia, serif;
  --FonteCorpo: 'Geist', -apple-system, sans-serif;
  --FonteMono: 'Geist Mono', monospace;

  --RaioGrande: 22px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--FonteCorpo);
  background-color: var(--CorFundo);
  color: var(--CorTexto);
  line-height: 1.6;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.Container {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 1.5rem;
  width: 100%;
}

.BarraTopo {
  background-color: rgba(250, 250, 247, 0.95);
  border-bottom: 1px solid var(--CorBorda);
  padding: 1.1rem 0;
}

.BarraTopoConteudo {
  display: flex;
  justify-content: center;
}

.LogoMarca {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  text-decoration: none;
  color: var(--CorTexto);
}

.LogoIcone {
  width: 32px;
  height: 32px;
  background-color: var(--CorTexto);
  border-radius: 8px;
}

.LogoTexto {
  font-family: var(--FonteDisplay);
  font-size: 1.15rem;
  font-weight: 400;
  letter-spacing: -0.01em;
}

.LogoTexto em {
  font-style: italic;
  color: var(--CorDestaque);
}

main {
  flex: 1;
  padding: 4rem 0 5rem;
}

.DownsellCabecalho {
  text-align: center;
  margin-bottom: 3rem;
}

.DownsellEtiqueta {
  display: inline-block;
  font-family: var(--FonteMono);
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--CorDestaque);
  margin-bottom: 1rem;
  padding: 0.4rem 1rem;
  background-color: var(--CorDestaqueFundo);
  border-radius: 100px;
}

.DownsellTitulo {
  font-family: var(--FonteDisplay);
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: -0.025em;
  margin-bottom: 1rem;
}

.DownsellTitulo em {
  font-style: italic;
  color: var(--CorDestaque);
}

.DownsellSubtitulo {
  font-size: 1.05rem;
  color: var(--CorTextoSuave);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.65;
}

.DownsellCaixa {
  background-color: var(--CorCartao);
  border: 1px solid var(--CorBorda);
  border-radius: var(--RaioGrande);
  padding: 2.5rem;
  box-shadow: 0 4px 24px var(--CorSombraMedia);
  display: flex;
  justify-content: center;
}

#box_affiliatespay {
  width: 100%;
  max-width: 650px;
}

.RodapeMini {
  background-color: var(--CorTexto);
  color: rgba(250, 250, 247, 0.5);
  padding: 1.5rem 0;
  font-family: var(--FonteMono);
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  text-align: center;
}

@media (max-width: 600px) {
  .DownsellCaixa { padding: 1.5rem 1rem; }
  main { padding: 2.5rem 0 3.5rem; }
}
</style>
</head>
<body>

<header class="BarraTopo">
  <div class="Container">
    <div class="BarraTopoConteudo">
      <a href="../index.html" class="LogoMarca">
        <div class="LogoIcone"></div>
        <span class="LogoTexto">Back<em>end</em> Lab</span>
      </a>
    </div>
  </div>
</header>

<main>
  <div class="Container">

    <div class="DownsellCabecalho">
      <span class="DownsellEtiqueta">Última chance · Oferta reduzida</span>
      <h1 class="DownsellTitulo">
        Tudo bem. Mas antes de ir,<br>veja esta <em>oferta alternativa</em>.
      </h1>
      <p class="DownsellSubtitulo">
        Preparamos uma opção mais acessível especialmente para você. Disponível apenas neste momento.
      </p>
    </div>

    <div class="DownsellCaixa">
      <!-- AFFILIATESPAY - Upsell Widget -->
      <div id="box_affiliatespay"></div>
      <!-- AFFILIATESPAY - Upsell Widget -->
    </div>

  </div>
</main>

<footer class="RodapeMini">
  <div class="Container">
    © 2026 · Backend Lab · Todos os direitos reservados
  </div>
</footer>

<script src="https://pay.celetus.com/assets/js/affiliatespay.upsell.js"></script>
<script>
  opts = {
    key: 'COLE_AQUI_A_CHAVE_DO_DOWNSELL',
    width: '650',
    height: '420'
  };
  Upsell.Widget.show(opts);
</script>

</body>
</html>
